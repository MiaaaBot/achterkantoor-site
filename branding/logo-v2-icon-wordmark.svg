<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60">
  <!-- Backoffice gateway icon: abstract door/portal shape -->
  <g transform="translate(4, 4)">
    <!-- Outer rounded rectangle (building/office frame) -->
    <rect x="0" y="0" width="44" height="52" rx="6" ry="6" fill="none" stroke="#2563eb" stroke-width="3"/>
    <!-- Inner doorway arch -->
    <path d="M14 52 L14 26 Q14 16 22 16 Q30 16 30 26 L30 52" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Small arrow pointing inward (suggesting "backend") -->
    <path d="M36 22 L22 22" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
    <path d="M26 18 L22 22 L26 26" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="62" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1c1917">Achter</tspan><tspan fill="#2563eb">Kantoor</tspan>
  </text>
</svg>